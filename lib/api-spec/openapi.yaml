        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Customer:
      type: object
      required: [id, name, phone, created_at]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        address:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        initial_balance:
          type: number
        created_at:
          type: string

    CustomerInput:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
        description:
          type: string
        initial_balance:
          type: number

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        initial_balance:
          type: number

    CustomerProfile:
      type: object
      required: [customer, jobs, invoices, total_debt]
      properties:
        customer:
          $ref: "#/components/schemas/Customer"
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        invoices:
          type: array
          items:
            $ref: "#/components/schemas/Invoice"
        total_debt:
          type: number

    Job:
      type: object
      required: [id, customer_id, description, status, created_at]
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        customer_name:
          type: ["string", "null"]
        customer_phone:
          type: ["string", "null"]
        description:
          type: string
        status:
          type: string
          enum: [pending, completed]
        scheduled_date:
          type: ["string", "null"]
        scheduled_time:
          type: ["string", "null"]
        created_at:
          type: string
        completed_at:
          type: ["string", "null"]

    JobInput:
      type: object
      required: [customer_id, description]
      properties:
        customer_id:
          type: integer
        description:
          type: string
        status:
          type: string
          enum: [pending, completed]

    JobUpdate:
      type: object
      properties:
        description:
          type: string
        status:
          type: string
          enum: [pending, completed]

    InvoiceItem:
      type: object
      required: [title, quantity, unit_price]
      properties:
        title:
          type: string
        quantity:
          type: number
        unit_price:
          type: number
        brand:
          type: ["string", "null"]
        equipment_id:
          type: ["integer", "null"]
        supplier_id:
          type: ["integer", "null"]
        purchase_price:
          type: ["number", "null"]

    Invoice:
      type: object
      required: [id, customer_id, title, date, items, total_amount, status, created_at]
      properties:
        id:
          type: integer
        customer_id:
          type: integer
        customer_name:
          type: ["string", "null"]
        job_id:
          type: ["integer", "null"]
        title:
          type: string
        date:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
        notes:
          type: ["string", "null"]
        discount:
          type: number
        total_amount:
          type: number
